name: Update Fundamentals

on:
  schedule:
    # Run every Sunday at 06:00 UTC (~13:00 WIB)
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh FALLBACK valuation + analyst targets
        run: node scripts/update-fundamentals.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-update fundamentals $(date -u +%Y-%m-%d)"
          git push
