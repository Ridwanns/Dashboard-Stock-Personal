[build]
  functions = "netlify/functions"
  publish   = "."

[build.environment]
  NODE_VERSION = "20"

# ---------- API routes ----------

[[redirects]]
  from = "/api/quotes"
  to = "/.netlify/functions/quotes"
  status = 200

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/api/financials"
  to = "/.netlify/functions/financials"
  status = 200

[[redirects]]
  from = "/api/peers"
  to = "/.netlify/functions/peers"
  status = 200

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/technicals"
  to = "/.netlify/functions/technicals"
  status = 200

# ---------- Security / CSP ----------
# CSP restricts where scripts, styles, fonts, frames, and XHR can come from.
# `connect-src` covers fetch() targets: our own origin + the two Yahoo hosts + Stooq + SEC EDGAR.
# `script-src` allows jsdelivr (Three.js) + TradingView. `frame-src` allows TradingView widgets.
# `'unsafe-inline'` for script-src is required by the inline scripts already in index.html.

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://s3.tradingview.com https://s.tradingview.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://query1.finance.yahoo.com https://query2.finance.yahoo.com https://stooq.com https://data.sec.gov https://feeds.finance.yahoo.com https://corsproxy.io https://api.allorigins.win https://api.codetabs.com https://api.rss2json.com https://eodhd.com; frame-src https://s.tradingview.com https://www.tradingview.com https://*.tradingview.com; worker-src 'self' blob:; child-src 'self' blob:; base-uri 'self'; form-action 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
